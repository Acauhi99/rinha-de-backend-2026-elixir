name: rinha-backend-2026-elixir

services:
  lb:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api01
      - api02
    mem_limit: 20m
    cpus: 0.10
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 20MB

  api01:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ROLE: api
      PORT: "4000"
      INDEX_DIR: /app/index
      CANDIDATES_TARGET: "${CANDIDATES_TARGET:-1200}"
      CANDIDATES_HARD_CAP: "${CANDIDATES_HARD_CAP:-2000}"
      COWBOY_MAX_CONNECTIONS: "${COWBOY_MAX_CONNECTIONS:-80}"
      COWBOY_NUM_ACCEPTORS: "${COWBOY_NUM_ACCEPTORS:-4}"
      COWBOY_IDLE_TIMEOUT_MS: "${COWBOY_IDLE_TIMEOUT_MS:-2000}"
      COWBOY_REQUEST_TIMEOUT_MS: "${COWBOY_REQUEST_TIMEOUT_MS:-2500}"
      COWBOY_MAX_KEEPALIVE: "${COWBOY_MAX_KEEPALIVE:-30}"
      RINHA_RESOURCES_DIR: /app/resources
      ELIXIR_ERL_OPTIONS: "+fnu"
      ERL_AFLAGS: "+S 1:1 +A 1 +sbwt none +sbwtdcpu none +sbwtdio none"
    ports:
      - "4001:4000"
    mem_limit: 165m
    cpus: 0.45
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: 165MB

  api02:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ROLE: api
      PORT: "4000"
      INDEX_DIR: /app/index
      CANDIDATES_TARGET: "${CANDIDATES_TARGET:-1200}"
      CANDIDATES_HARD_CAP: "${CANDIDATES_HARD_CAP:-2000}"
      COWBOY_MAX_CONNECTIONS: "${COWBOY_MAX_CONNECTIONS:-80}"
      COWBOY_NUM_ACCEPTORS: "${COWBOY_NUM_ACCEPTORS:-4}"
      COWBOY_IDLE_TIMEOUT_MS: "${COWBOY_IDLE_TIMEOUT_MS:-2000}"
      COWBOY_REQUEST_TIMEOUT_MS: "${COWBOY_REQUEST_TIMEOUT_MS:-2500}"
      COWBOY_MAX_KEEPALIVE: "${COWBOY_MAX_KEEPALIVE:-30}"
      RINHA_RESOURCES_DIR: /app/resources
      ELIXIR_ERL_OPTIONS: "+fnu"
      ERL_AFLAGS: "+S 1:1 +A 1 +sbwt none +sbwtdcpu none +sbwtdio none"
    ports:
      - "4002:4000"
    mem_limit: 165m
    cpus: 0.45
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: 165MB
