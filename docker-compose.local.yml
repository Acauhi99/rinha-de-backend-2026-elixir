name: rinha-backend-2026-elixir

services:
  lb:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api01
      - api02
    mem_limit: 10m
    cpus: 0.10
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 10MB

  api01:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ROLE: api
      PORT: "4000"
      ENGINE_URL: http://engine:4000/internal/score
      ENGINE_TIMEOUT_MS: "10"
      RINHA_RESOURCES_DIR: /app/resources
      ERL_AFLAGS: "+S 1:1 +A 1 +sbwt none +sbwtdcpu none +sbwtdio none"
    depends_on:
      - engine
    ports:
      - "4001:4000"
    mem_limit: 70m
    cpus: 0.125
    deploy:
      resources:
        limits:
          cpus: "0.125"
          memory: 70MB

  api02:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ROLE: api
      PORT: "4000"
      ENGINE_URL: http://engine:4000/internal/score
      ENGINE_TIMEOUT_MS: "10"
      RINHA_RESOURCES_DIR: /app/resources
      ERL_AFLAGS: "+S 1:1 +A 1 +sbwt none +sbwtdcpu none +sbwtdio none"
    depends_on:
      - engine
    ports:
      - "4002:4000"
    mem_limit: 70m
    cpus: 0.125
    deploy:
      resources:
        limits:
          cpus: "0.125"
          memory: 70MB

  engine:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ROLE: engine
      PORT: "4000"
      INDEX_DIR: /app/index
      CANDIDATES_TARGET: "6000"
      CANDIDATES_HARD_CAP: "10000"
    ports:
      - "4003:4000"
    mem_limit: 200m
    cpus: 0.65
    deploy:
      resources:
        limits:
          cpus: "0.65"
          memory: 200MB
