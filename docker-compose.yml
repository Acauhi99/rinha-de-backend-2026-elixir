name: rinha-backend-2026-elixir

services:
  lb:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api01
      - api02
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 10MB

  api01:
    image: acauhi/rinha-2026-elixir@sha256:8e173a77be28a956eab4a483378669b49e05b1b51d036a558da4a063b635db9b
    environment:
      APP_ROLE: api
      PORT: "4000"
      ENGINE_URL: http://engine:4000/internal/score
      ENGINE_TIMEOUT_MS: "8"
      CANDIDATES_TARGET: "1000"
      CANDIDATES_HARD_CAP: "2000"
      RINHA_RESOURCES_DIR: /app/resources
      ERL_AFLAGS: "+S 1:1 +A 1 +sbwt none +sbwtdcpu none +sbwtdio none"
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: 170MB

  api02:
    image: acauhi/rinha-2026-elixir@sha256:8e173a77be28a956eab4a483378669b49e05b1b51d036a558da4a063b635db9b
    environment:
      APP_ROLE: api
      PORT: "4000"
      ENGINE_URL: http://engine:4000/internal/score
      ENGINE_TIMEOUT_MS: "8"
      CANDIDATES_TARGET: "1000"
      CANDIDATES_HARD_CAP: "2000"
      RINHA_RESOURCES_DIR: /app/resources
      ERL_AFLAGS: "+S 1:1 +A 1 +sbwt none +sbwtdcpu none +sbwtdio none"
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: 170MB
